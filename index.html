<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Sidhant Thole — Senior Data Scientist & AI Researcher" />
  <title>Sidhant Thole — Portfolio</title>
  <link rel="stylesheet" href="styles.css?v=15" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Kalam:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body data-theme="blueprint" data-density="normal" data-labels="on">

<header class="site-header"></header>

<main class="content">
  <section class="tab-panel" id="home"></section>
  <section class="tab-panel" id="about" hidden></section>
  <section class="tab-panel" id="projects" hidden></section>
  <section class="tab-panel" id="posts" hidden></section>
  <section class="tab-panel" id="portfolio" hidden></section>
  <section class="tab-panel" id="resume" hidden></section>
</main>

<footer class="site-footer"></footer>

<!-- Matmul transition overlay -->
<div class="matmul-overlay" id="matmul-overlay" aria-hidden="true">
  <div class="matmul-stage">
    <span class="matmul-label">projecting</span>
    <div class="matmul-mat A" id="mat-A"></div>
    <div class="matmul-op">×</div>
    <div class="matmul-mat B" id="mat-B"></div>
    <div class="matmul-op">=</div>
    <div class="matmul-mat C" id="mat-C"></div>
  </div>
</div>

<!-- Tweaks panel -->
<div class="tweaks-panel" id="tweaks">
  <div class="tweaks-title">Tweaks</div>
  <label>theme
    <div class="tseg" data-key="theme">
      <button data-val="blueprint" class="on">blueprint</button>
      <button data-val="paper">paper</button>
      <button data-val="dark">dark</button>
    </div>
  </label>
  <label>density
    <div class="tseg" data-key="density">
      <button data-val="normal" class="on">normal</button>
      <button data-val="compact">compact</button>
    </div>
  </label>
  <label>labels
    <div class="tseg" data-key="labels">
      <button data-val="on" class="on">on</button>
      <button data-val="off">off</button>
    </div>
  </label>
</div>

<script src="site.js?v=1"></script>
<script>
// === Persisted tweak defaults ===
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "blueprint",
  "density": "normal",
  "labels": "on"
}/*EDITMODE-END*/;

// Wait for content to render before wiring interactive bits
document.addEventListener('content:ready', () => {

  // --- Tweaks ---
  (function initTweaks() {
    const body = document.body;
    Object.entries(TWEAK_DEFAULTS).forEach(([k,v]) => body.setAttribute('data-'+k, v));
    const panel = document.getElementById('tweaks');
    panel.querySelectorAll('.tseg').forEach(seg => {
      const key = seg.dataset.key;
      seg.querySelectorAll('button').forEach(b => {
        b.classList.toggle('on', b.dataset.val === TWEAK_DEFAULTS[key]);
        b.addEventListener('click', () => {
          seg.querySelectorAll('button').forEach(x => x.classList.remove('on'));
          b.classList.add('on');
          body.setAttribute('data-'+key, b.dataset.val);
          try {
            window.parent.postMessage({type: '__edit_mode_set_keys', edits: {[key]: b.dataset.val}}, '*');
          } catch(e) {}
        });
      });
    });
    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') panel.classList.add('open');
      if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('open');
    });
    try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(e) {}
  })();

  // --- Tabs + matmul transition ---
  (function initTabs() {
    const panels = document.querySelectorAll('.tab-panel');
    const overlay = document.getElementById('matmul-overlay');
    const matA = document.getElementById('mat-A');
    const matB = document.getElementById('mat-B');
    const matC = document.getElementById('mat-C');

    function buildMat(el) {
      el.innerHTML = '';
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
        const d = document.createElement('div');
        d.className = 'matmul-cell';
        d.dataset.r = r; d.dataset.c = c;
        el.appendChild(d);
      }
    }
    buildMat(matA); buildMat(matB); buildMat(matC);

    function runMatmul(done) {
      overlay.classList.add('on');
      const aCells = matA.querySelectorAll('.matmul-cell');
      const bCells = matB.querySelectorAll('.matmul-cell');
      const cCells = matC.querySelectorAll('.matmul-cell');
      cCells.forEach(c => c.classList.remove('filled','pulse'));

      let step = 0; const total = 16; let swapped = false;
      const t = setInterval(() => {
        aCells.forEach(c => c.classList.remove('row-hot'));
        bCells.forEach(c => c.classList.remove('col-hot'));
        cCells.forEach(c => c.classList.remove('pulse'));
        if (!swapped && step >= 4 && done) { swapped = true; done(); }
        if (step >= total) {
          clearInterval(t);
          setTimeout(() => overlay.classList.remove('on'), 100);
          if (!swapped && done) done();
          return;
        }
        const r = Math.floor(step / 4);
        const c = step % 4;
        aCells.forEach(cell => { if (+cell.dataset.r === r) cell.classList.add('row-hot'); });
        bCells.forEach(cell => { if (+cell.dataset.c === c) cell.classList.add('col-hot'); });
        cCells.forEach(cell => {
          if (+cell.dataset.r === r && +cell.dataset.c === c) {
            cell.classList.add('filled','pulse');
          }
        });
        step++;
      }, 38);
    }

    function show(id) {
      panels.forEach(p => p.hidden = (p.id !== id));
      document.querySelectorAll('.nav-links a').forEach(a => {
        a.classList.toggle('active', a.dataset.tab === id);
      });
      window.scrollTo({top: 0, behavior: 'instant'});
    }
    function fromHash(animate) {
      const id = (location.hash || '#home').slice(1);
      const valid = ['home','about','projects','posts','portfolio','resume'].includes(id) ? id : 'home';
      if (animate) runMatmul(() => show(valid)); else show(valid);
    }

    document.querySelectorAll('[data-tab]').forEach(a => {
      a.addEventListener('click', (e) => {
        const tab = a.dataset.tab;
        if (!tab) return;
        e.preventDefault();
        if (('#' + tab) === location.hash) return;
        location.hash = '#' + tab;
      });
    });
    window.addEventListener('hashchange', () => fromHash(true));
    fromHash(false);
  })();

  // --- KV-cache loader animation on Notes tab ---
  (function kvCacheScene() {
    const grid = document.getElementById('kv-grid');
    if (!grid) return;
    const COLS = 24, ROWS = 6;
    const TOTAL = COLS * ROWS;
    for (let i = 0; i < TOTAL; i++) {
      const cell = document.createElement('i');
      grid.appendChild(cell);
    }
    const cells = Array.from(grid.children);
    const pctEl = document.querySelector('.kv-loader [data-pct]');
    const layerEl = document.querySelector('.kv-loader [data-layer]');
    const headEl = document.querySelector('.kv-loader [data-head]');
    const seqEl = document.querySelector('.kv-loader [data-seq]');
    const replyEl = document.getElementById('younger-reply');
    const REPLY = (window.__youngerReply || '...so I just keep going?');
    let started = false;

    function startFill() {
      if (started) return; started = true;
      let i = 0;
      const tick = () => {
        if (i >= TOTAL) { setTimeout(typeReply, 350); return; }
        const cell = cells[i];
        cell.classList.add(i % 2 === 0 ? 'k' : 'v', 'hot');
        setTimeout(() => cell.classList.remove('hot'), 120);
        const pct = Math.round(((i+1) / TOTAL) * 100);
        pctEl.textContent = pct + '%';
        layerEl.textContent = Math.min(12, Math.floor((i / TOTAL) * 12) + 1);
        headEl.textContent = Math.min(8, (i % 8) + 1);
        seqEl.textContent = Math.min(128, Math.round(((i+1) / TOTAL) * 128));
        i++;
        setTimeout(tick, 18);
      };
      tick();
    }
    function typeReply() {
      if (!replyEl) return;
      let i = 0;
      const step = () => {
        if (i > REPLY.length) return;
        replyEl.textContent = REPLY.slice(0, i);
        i++;
        setTimeout(step, 55);
      };
      step();
    }

    const postsPanel = document.getElementById('posts');
    const obs = new MutationObserver(() => { if (!postsPanel.hidden) startFill(); });
    obs.observe(postsPanel, { attributes: true, attributeFilter: ['hidden'] });
    if (!postsPanel.hidden) startFill();
  })();

});
</script>
</body>
</html>
